<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actual Operation — HAULOPS</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    :root {
      --status-uti: #22C55E;
      --status-rfu: #F97316;
      --status-bd: #EF4444;
      --status-c: #6B7280;
      --status-pa: #FACC15;
      --status-ua: #3B82F6;
      --status-stby: #94A3B8;
      --status-pm: #A855F7;
      --cell-size: 80px;
    }
    .act-page { max-width:100%; overflow-x:hidden; }
    .act-kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }
    .act-kpi-card { background:var(--bg-card); border-radius:var(--radius-lg); border:1px solid var(--border); box-shadow:var(--shadow-card); padding:18px 20px; min-width:0; }
    .act-kpi-card .kpi-label { font-size:10px; text-transform:uppercase; letter-spacing:.7px; color:var(--text-muted); font-weight:600; }
    .act-kpi-card .kpi-value { font-family:'DM Serif Display',serif; font-size:28px; color:var(--text-primary); line-height:1.1; margin:4px 0 2px; }
    .act-kpi-card .kpi-sub { font-size:11px; color:var(--text-secondary); }
    .act-kpi-card .kpi-icon { width:38px; height:38px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
    .act-toolbar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; min-width:0; }
    .act-filter-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; min-width:0; }
    .act-legend { display:flex; gap:6px; overflow-x:auto; flex-shrink:0; padding-bottom:2px; }
    .act-legend-item { display:flex; align-items:center; gap:5px; border-radius:99px; border:1px solid var(--border); background:white; padding:3px 10px; font-size:11px; font-weight:500; color:var(--text-secondary); flex-shrink:0; }
    .act-legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .act-generate { display:flex; align-items:center; gap:16px; flex-wrap:wrap; min-width:0; }
    .act-generate-right { display:flex; align-items:end; gap:10px; flex-wrap:wrap; margin-left:auto; max-width:100%; min-width:0; }
    .act-matrix-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius-lg); background:var(--bg-card); box-shadow:var(--shadow-card); }
    .act-matrix-wrap table { border-collapse:separate; border-spacing:0; font-size:12px; min-width:100%; }
    .act-matrix-wrap thead { position:sticky; top:0; z-index:10; }
    .act-matrix-wrap thead th { background:var(--cream-deep); border-bottom:2px solid var(--cream-border); padding:8px 10px; font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--text-secondary); font-weight:600; white-space:nowrap; text-align:center; }
    .act-matrix-wrap thead th.pinned { position:sticky; left:0; z-index:12; background:var(--cream-deep); }
    .act-matrix-wrap thead th.pinned2 { position:sticky; left:118px; z-index:12; background:var(--cream-deep); }
    .act-matrix-wrap thead th.pinned3 { position:sticky; left:228px; z-index:12; background:var(--cream-deep); }
    .act-matrix-wrap thead th.pinned4 { position:sticky; left:388px; z-index:12; background:var(--cream-deep); }
    .act-matrix-wrap tbody td { padding:0; text-align:center; border-bottom:1px solid var(--border); vertical-align:middle; }
    .act-matrix-wrap tbody td.pinned { position:sticky; left:0; z-index:5; background:var(--bg-card); border-right:1px solid var(--border); font-size:12px; font-weight:600; padding:8px 10px; }
    .act-matrix-wrap tbody td.pinned2 { position:sticky; left:118px; z-index:5; background:var(--bg-card); border-right:1px solid var(--border); font-size:11px; color:var(--text-secondary); padding:8px 10px; }
    .act-matrix-wrap tbody td.pinned3 { position:sticky; left:228px; z-index:5; background:var(--bg-card); border-right:1px solid var(--border); font-size:11px; padding:8px 10px; }
    .act-matrix-wrap tbody td.pinned4 { position:sticky; left:388px; z-index:5; background:var(--bg-card); border-right:1px solid var(--border); font-size:11px; padding:8px 10px; }
    .act-cell { width:var(--cell-size); min-width:var(--cell-size); height:42px; cursor:pointer; position:relative; transition:background .15s; }
    .act-cell:hover { filter:brightness(.88); }
    .act-cell .status-code { font-weight:700; font-size:11px; }
    .act-cell.has-note::after { content:''; position:absolute; top:4px; right:4px; width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.7); box-shadow:0 1px 2px rgba(0,0,0,.2); }
    .act-summary-cell { padding:8px 10px !important; font-weight:600; font-size:11px; min-width:70px; border-left:2px solid var(--border); background:#FAF8F5; }
    .act-summary-cell.pa { color:var(--status-uti); }
    .act-summary-cell.ua { color:var(--status-ua); }
    .act-summary-cell.prod { color:#A855F7; }
    .act-info-text { font-size:11px; color:var(--text-muted); white-space:nowrap; }
    .act-view-btn { padding:6px 14px; border-radius:var(--radius-sm); font-size:12px; font-weight:500; cursor:pointer; border:1px solid var(--border-strong); background:white; color:var(--text-secondary); transition:all .15s; flex-shrink:0; }
    .act-view-btn.active { background:var(--brown-dark); color:white; border-color:var(--brown-dark); }
    .act-view-btn:hover:not(.active) { background:var(--cream); }
    .act-date-input { border:1px solid var(--border-strong); border-radius:var(--radius-sm); padding:7px 12px; font-family:'DM Sans',sans-serif; font-size:13px; outline:none; }
    .act-date-input:focus { border-color:var(--brown-mid); box-shadow:0 0 0 3px rgba(158,123,85,.12); }
    .act-card-inner { padding:16px 20px; margin-bottom:16px; min-width:0; }
    .page-header-actions { flex-shrink:0; min-width:0; }
    .page-header { flex-wrap:wrap; gap:12px; }
    .act-section-icon { width:32px; height:32px; border-radius:var(--radius-sm); background:var(--gold-pale); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    @media(max-width:1100px){ .act-kpi-grid { grid-template-columns:repeat(2,1fr); } }
    @media(max-width:700px){ .act-kpi-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div id="sidebarContainer"></div>
<div class="main-wrapper">
  <div id="topbarContainer"></div>
  <main class="page-content">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:16px">
      <div style="font-size:48px;opacity:0.5">⏸️</div>
      <h2 style="color:var(--text-muted);margin:0">Actual Operation Sedang Di-Hold</h2>
      <p style="color:var(--text-muted);font-size:14px;max-width:480px">Modul Actual Operation Daily masih dalam tahap pengembangan dan akan tersedia pada rilis berikutnya.</p>
      <div style="display:flex;gap:8px;margin-top:8px">
        <span class="badge" style="background:#eee;color:#888;padding:4px 12px">Matrix Status Armada</span>
        <span class="badge" style="background:#eee;color:#888;padding:4px 12px">PA & UA</span>
        <span class="badge" style="background:#eee;color:#888;padding:4px 12px">VOR Generate</span>
      </div>
    </div>
  </main>
</div>

<script src="../js/app.js"></script>
<script>
document.getElementById('sidebarContainer').innerHTML = renderSidebar('actual_operation');
document.getElementById('topbarContainer').innerHTML = renderTopbar('Actual Operation Daily');
</script>
</script>
</body>
</html>
