<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hauling Monitor — Mining Operations System</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--brown-deep); }
    .splash { text-align:center; color:white; }
    .splash-icon { width:64px; height:64px; border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
    .splash h1 { font-family:'DM Serif Display',serif; font-size:28px; color:var(--gold-pale); margin-bottom:6px; }
    .splash p { color:rgba(196,168,130,0.6); font-size:13px; margin-bottom:24px; }
    .loader { width:40px; height:3px; background:rgba(255,255,255,0.1); border-radius:99px; margin:0 auto; overflow:hidden; }
    .loader-bar { height:100%; width:0%; background:var(--gold); border-radius:99px; transition:width .1s; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
  </style>
</head>
<body>
  <div class="splash">
    <div class="splash-icon"><img src="assets/haulops.png" alt="HAULOPS" style="height:56px;width:auto;display:block"></div>
    <h1>Hauling Monitor</h1>
    <p>Smart Mining BJU Platform v1.1</p>
    <div class="loader"><div class="loader-bar" id="bar"></div></div>
  </div>
  <script>
    let w = 0;
    const bar = document.getElementById('bar');
    const iv = setInterval(() => {
      w += Math.random() * 20;
      if (w >= 100) { w = 100; bar.style.width = '100%'; clearInterval(iv); setTimeout(() => { window.location.href = 'pages/login.html'; }, 300); }
      else bar.style.width = w + '%';
    }, 120);
  </script>
</body>
</html>
