server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression untuk performa lebih baik
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache static assets (JS, CSS, gambar) — versi lama browser tidak terlalu agresif
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # CRITICAL: Semua route dikembalikan ke index.html agar React Router bekerja
    # Tanpa ini, refresh halaman /shift/123 akan menghasilkan 404
    location / {
        try_files $uri $uri/ /index.html;
    }
}
